name: 'CodeQL Advanced'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '18 7 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'corretto'
          java-version: '17'

      - uses: github/codeql-action/init@b22c66273205240d86582638b860f9b25772b4d3 # v3
        with:
          languages: java

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Build
        run: ./gradlew classes testClasses functionalTestClasses --dependency-verification lenient

      - uses: github/codeql-action/analyze@b22c66273205240d86582638b860f9b25772b4d3 # v3

